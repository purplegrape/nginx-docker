daemon off;
worker_processes 4;
error_log  /var/log/nginx/error.log notice;
pid /tmp/nginx.pid;

events {
    use epoll;
    worker_connections 1024;
}

http {
    default_type    application/octet-stream;
    include         /etc/nginx/mime.types;
    charset         utf-8;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    server_tokens   off;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout   65;
    types_hash_max_size 1536;
    client_max_body_size 1024m;
    directio 4m;

    gzip on;
    gzip_static on;
    gzip_buffers 64 4k;
    gzip_min_length 1k;
    gzip_disable "msie6";
    gzip_http_version 1.1;
    gzip_vary on;
    gzip_comp_level 3;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/x-javascript application/json application/xml image/svg+xml image/x-icon ;

    include /etc/nginx/conf.d/*.conf;
    include /local/*.conf;
}
